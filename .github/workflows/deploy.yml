name: Deploy via ECR + SSM (OIDC + Versioning)

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: auth
  ACCOUNT_ID: 288761736206

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # 1. Checkout
    - name: Checkout
      uses: actions/checkout@v4

    # 2. OIDC Login
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::288761736206:role/github-actions-ecr-role
        aws-region: ${{ env.AWS_REGION }}

    # 3. Login to ECR
    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. Generate Version
    - name: Set Version
      run: |
        DATE=$(date +%Y-%m-%d)
        VERSION_TAG=$DATE-${{ github.run_number }}
        echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV

    # 5. Build & Push
    - name: Build, Tag & Push
      run: |
        IMAGE_URI=${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}

        docker build -t $IMAGE_URI:${{ env.VERSION_TAG }} .
        docker tag $IMAGE_URI:${{ env.VERSION_TAG }} $IMAGE_URI:latest

        docker push $IMAGE_URI:${{ env.VERSION_TAG }}
        docker push $IMAGE_URI:latest

        echo "IMAGE_URI=$IMAGE_URI:${{ env.VERSION_TAG }}" >> $GITHUB_ENV

    # 6. Deploy via SSM
    - name: Deploy via SSM
      run: |
        INSTANCE_ID=${{ secrets.EC2_INSTANCE_ID }}
        IMAGE_URI=${{ env.IMAGE_URI }}

        COMMAND_ID=$(aws ssm send-command \
          --instance-ids $INSTANCE_ID \
          --document-name "AWS-RunShellScript" \
          --parameters commands="[
            \"aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin ${{ env.ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com\",
            \"docker pull $IMAGE_URI\",
            \"docker rm -f auth-container || true\",
            \"docker run -d --restart always -p 8501:8501 --name auth-container $IMAGE_URI\",
            \"docker image prune -f\"
          ]" \
          --query "Command.CommandId" \
          --output text)

        aws ssm wait command-executed \
          --command-id $COMMAND_ID \
          --instance-id $INSTANCE_ID

        aws ssm get-command-invocation \
          --command-id $COMMAND_ID \
          --instance-id $INSTANCE_ID
